<div class="auth-wrapper">
    <!-- Background Image with Overlay -->
    <div class="auth-bg">
        <img src="assets/luxury_real_estate_login_bg.png" alt="Luxury Real Estate">
        <div class="auth-overlay"></div>
    </div>

    <div class="auth-container">
        <!-- Back Button -->
        <a routerLink="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-area">
                    <div class="realtor-logo">HF</div>
                    <div class="logo-text">Home <span>Filla</span></div>
                </div>
                <h2>Welcome Back</h2>
                <p>Enter your details to access your account</p>
            </div>

            <form class="auth-form" (ngSubmit)="login()">
                <div class="form-group">
                    <label>Select Dashboard Role (Demo Mode)</label>
                    <div style="display: flex; gap: 12px; flex-direction: column; margin-top: 10px;">
                        <label style="display: flex; align-items: center; gap: 10px; padding: 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; transition: all 0.2s;" 
                               [style.background]="selectedRole === 'admin' ? 'rgba(74,108,247,0.1)' : 'rgba(255,255,255,0.02)'"
                               [style.border-color]="selectedRole === 'admin' ? '#4a6cf7' : 'rgba(255,255,255,0.1)'">
                            <input type="radio" name="role" value="admin" [(ngModel)]="selectedRole" style="width: auto;">
                            <div style="display: flex; flex-direction: column;">
                                <span style="font-weight: 600; color: white;">Admin Panel</span>
                                <span style="font-size: 12px; color: #94a3b8;">Full access to system management</span>
                            </div>
                        </label>

                        <label style="display: flex; align-items: center; gap: 10px; padding: 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; transition: all 0.2s;"
                               [style.background]="selectedRole === 'seller' ? 'rgba(20,184,166,0.1)' : 'rgba(255,255,255,0.02)'"
                               [style.border-color]="selectedRole === 'seller' ? '#14b8a6' : 'rgba(255,255,255,0.1)'">
                            <input type="radio" name="role" value="seller" [(ngModel)]="selectedRole" style="width: auto;">
                            <div style="display: flex; flex-direction: column;">
                                <span style="font-weight: 600; color: white;">Seller / Agent Panel</span>
                                <span style="font-size: 12px; color: #94a3b8;">Manage your properties and leads</span>
                            </div>
                        </label>

                        <label style="display: flex; align-items: center; gap: 10px; padding: 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; transition: all 0.2s;"
                               [style.background]="selectedRole === 'buyer' ? 'rgba(59,130,246,0.1)' : 'rgba(255,255,255,0.02)'"
                               [style.border-color]="selectedRole === 'buyer' ? '#3b82f6' : 'rgba(255,255,255,0.1)'">
                            <input type="radio" name="role" value="buyer" [(ngModel)]="selectedRole" style="width: auto;">
                            <div style="display: flex; flex-direction: column;">
                                <span style="font-weight: 600; color: white;">Buyer Panel</span>
                                <span style="font-size: 12px; color: #94a3b8;">View saved properties and messages</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-options" style="justify-content: center; margin-top: 20px;">
                    <span style="font-size: 13px; color: #f59e0b;"><i class="fas fa-info-circle"></i> This is a demo. No real password required.</span>
                </div>

                <button type="submit" class="auth-btn btn-primary" 
                        [style.background]="selectedRole === 'admin' ? 'linear-gradient(135deg, #4a6cf7, #7c3aed)' : selectedRole === 'seller' ? 'linear-gradient(135deg, #14b8a6, #0891b2)' : 'linear-gradient(135deg, #3b82f6, #2563eb)'">
                    Enter Dashboard
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a routerLink="/signup">Sign up for free</a></p>
            </div>
        </div>
    </div>
</div>
