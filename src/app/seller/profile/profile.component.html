<div class="properties-page">
  <div class="page-header">
    <div>
      <h1>My Profile</h1>
      <p class="page-subtitle">Update your personal information and contact details.</p>
    </div>
    <button class="btn-primary" (click)="saveProfile()" style="background: linear-gradient(135deg, #14b8a6 0%, #0891b2 100%);">
      <i class="fas fa-save"></i> Save Profile
    </button>
  </div>

  <div class="locations-grid">
    <div class="loc-card" style="height: auto; padding: 24px;">
      <div style="display:flex; align-items:center; gap:20px; margin-bottom: 24px;">
        <img [src]="profile.avatar" style="width:80px; height:80px; border-radius:50%; border:3px solid #14b8a6; object-fit:cover;">
        <div>
          <button style="background: rgba(0,0,0,0.05); color:#0f172a; border:1px solid rgba(0,0,0,0.1); padding:6px 12px; border-radius:8px; cursor:pointer;">
            Change Avatar
          </button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="profile.name">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" [(ngModel)]="profile.email" disabled style="opacity: 0.6; cursor: not-allowed;">
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" [(ngModel)]="profile.phone">
        </div>
      </div>
       <div class="form-row">
        <div class="form-group full-width">
          <label>Agency Name (Optional)</label>
          <input type="text" [(ngModel)]="profile.agency" placeholder="Are you affiliated with an agency?">
        </div>
      </div>
    </div>
  </div>
</div>
