<div class="properties-page">
  <div class="page-header">
    <div>
      <h1>My Inquiries</h1>
      <p class="page-subtitle">Track the status of your messages to agents and sellers.</p>
    </div>
  </div>

  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>Property</th>
          <th>Message Sent</th>
          <th>Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let i of inquiries">
          <td>{{ i.propertyTitle }}</td>
          <td style="max-width: 250px;">
            <p style="font-size: 13px; color: #f1f5f9; margin:0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
              {{ i.message }}
            </p>
          </td>
          <td style="font-size: 12px; color: #94a3b8;">{{ i.createdAt | date:'mediumDate' }}</td>
          <td>
            <span class="status-badge" [ngClass]="{'pending': i.status === 'new', 'approved': i.status !== 'new'}">
              {{ i.status === 'new' ? 'Awaiting Reply' : 'Replied' }}
            </span>
          </td>
          <td>
             <button class="btn-icon" title="View Conversation"><i class="fas fa-envelope-open-text"></i></button>
          </td>
        </tr>
        <tr *ngIf="inquiries.length === 0">
          <td colspan="5" class="empty-state">
            <i class="fas fa-paper-plane"></i>
            <p>You haven't sent any inquiries yet.</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
